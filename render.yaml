services:
  - type: web
    name: innofolio
    runtime: node
    buildCommand: |
      cd client && npm install && npm run build &&
      cd ../server && npm install && npx prisma generate &&
      npx prisma migrate deploy && npm run build
    startCommand: node server/dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: innofolio-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: innofolio-db
    plan: free